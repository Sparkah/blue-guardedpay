    <div id="root"></div>
    <script>
      // Bypass auth for static preview — intercept fetch to return mock data
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        const urlStr = typeof url === 'string' ? url : url.toString();
        // Mock login response
        if (urlStr.includes('/admin/auth/login')) {
          return Promise.resolve(new Response(JSON.stringify({
            accessToken: 'preview-token',
            refreshToken: 'preview-refresh',
            admin: { id: '1', email: 'designer@guardedpaypro.com', name: 'UI Designer', role: 'super_admin' }
          }), { status: 200, headers: { 'Content-Type': 'application/json' } }));
        }
        // Mock all other API calls with empty data
        if (urlStr.includes('/api/v1')) {
          return Promise.resolve(new Response(JSON.stringify({
            success: true, data: [], merchants: [], transactions: [], total: 0, totalCount: 0,
            stats: { totalRevenue: 15000, transactionsToday: 42, activeMerchants: 6, chargebackRate: 0 },
            pendingApplications: 3, recentTransactions: [], chartData: []
          }), { status: 200, headers: { 'Content-Type': 'application/json' } }));
        }
        return originalFetch.apply(this, arguments);
      };
    </script>
